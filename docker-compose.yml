services:
  # ── Infrastructure ──────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: "delivereats-kafka-cluster-001"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    user: root
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "DeliverEats123!"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "DeliverEats123!" -C -Q "SELECT 1"
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./init.sql:/init.sql:ro
    entrypoint: /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "DeliverEats123!" -C -i /init.sql
    restart: "no"

  # ── App Services ────────────────────────────────────────────────
  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    ports:
      - "8081:8080"
    environment:
      NEXT_SERVICE_URL: http://kitchen-service:8080
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SQLSERVER_URL: "jdbc:sqlserver://sqlserver:1433;databaseName=delivereats;encrypt=false"
      SQLSERVER_USER: sa
      SQLSERVER_PASSWORD: "DeliverEats123!"
      BROKER: kafka
    depends_on:
      kafka:
        condition: service_healthy
      sqlserver-init:
        condition: service_completed_successfully

  kitchen-service:
    build:
      context: .
      dockerfile: kitchen-service/Dockerfile
    ports:
      - "8082:8080"
    environment:
      NEXT_SERVICE_URL: http://payment-service:8080
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BROKER: kafka
    depends_on:
      kafka:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    ports:
      - "8083:8080"
    environment:
      NEXT_SERVICE_URL: http://rider-service:8080
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BROKER: kafka
    depends_on:
      kafka:
        condition: service_healthy

  rider-service:
    build:
      context: .
      dockerfile: rider-service/Dockerfile
    ports:
      - "8084:8080"
    environment:
      NEXT_SERVICE_URL: http://notification-service:8080
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BROKER: kafka
    depends_on:
      kafka:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    ports:
      - "8085:8080"
    environment:
      NEXT_SERVICE_URL: http://tracking-service:8080
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BROKER: kafka
    depends_on:
      kafka:
        condition: service_healthy

  tracking-service:
    build:
      context: .
      dockerfile: tracking-service/Dockerfile
    ports:
      - "8086:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BROKER: kafka
    depends_on:
      kafka:
        condition: service_healthy

  # ── Frontend ────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - order-service
      - tracking-service

volumes:
  sqlserver-data:
